name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows binary + NSIS installer
        run: wails build -platform windows/amd64 -nsis

      - name: Create GitHub Release (Windows)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/bin/companion.exe
            build/bin/*-installer.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS universal binary
        run: wails build -platform darwin/universal

      - name: Zip .app bundle
        # Wails names the bundle from productName ("CYD Dashboard Companion.app"),
        # not outputfilename — glob it.
        run: cd build/bin && zip -r companion-macos.zip *.app

      - name: Upload macOS release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/companion-macos.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux binary
        # ubuntu-latest ships webkit2gtk-4.1 only; Wails defaults to 4.0.
        run: wails build -platform linux/amd64 -tags webkit2_41

      - name: Package AppImage
        # FUSE is unavailable on GitHub runners; run AppImage tools via extraction.
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          # Assemble AppDir from the Wails binary + icon, then build AppImage
          # via linuxdeploy (Wails has no native AppImage target).
          APPDIR=build/AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp build/bin/companion "$APPDIR/usr/bin/companion"
          cp build/appicon.png "$APPDIR/companion.png"
          cat > "$APPDIR/companion.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=CYD Dashboard Companion
          Exec=companion
          Icon=companion
          Categories=Utility;
          Terminal=false
          EOF
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appimage-extract >/dev/null
          ARCH=x86_64 ./squashfs-root/AppRun \
            --appdir "$APPDIR" \
            --desktop-file "$APPDIR/companion.desktop" \
            --icon-file "$APPDIR/companion.png" \
            --output appimage
          mv CYD*.AppImage build/bin/companion-linux-amd64.AppImage

      - name: Upload Linux release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/companion-linux-amd64.AppImage
