name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows binary + NSIS installer
        # -nsis requires NSIS on the runner; Wails installs it automatically
        # on windows-latest via its build tooling.
        run: wails build -platform windows/amd64 -nsis

      - name: Create GitHub Release (Windows)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/bin/companion.exe
            build/bin/companion-installer.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS universal binary
        run: wails build -platform darwin/universal

      - name: Zip .app bundle
        run: cd build/bin && zip -r companion-macos.zip companion.app

      - name: Upload macOS release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/companion-macos.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux binary
        run: wails build -platform linux/amd64

      - name: Package Linux binary
        run: |
          cd build/bin
          tar -czf companion-linux-amd64.tar.gz companion

      - name: Upload Linux release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/companion-linux-amd64.tar.gz
